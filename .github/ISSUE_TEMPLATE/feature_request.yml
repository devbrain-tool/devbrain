name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for DevBrain? We'd love to hear it. For open-ended discussion, consider using [Discussions](https://github.com/devbrain-tool/devbrain/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's frustrating about the current experience?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Dashboard
        - Capture Pipeline
        - Intelligence Agents
        - Storage / Graph
        - LLM Integration
        - Privacy / Security
        - Configuration
        - Documentation
        - Other
