name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - run: dotnet restore DevBrain.slnx
      - run: dotnet build DevBrain.slnx --no-restore
      - run: dotnet test DevBrain.slnx --no-build --verbosity minimal

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --prefix dashboard --install-strategy=nested
      - run: npm run build --prefix dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

  build:
    needs: [test, dashboard]
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: windows-latest
            rid: win-arm64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive: tar.gz
          - os: macos-latest
            rid: osx-x64
            archive: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: src/DevBrain.Api/wwwroot/

      - name: Publish Daemon
        run: >
          dotnet publish src/DevBrain.Api -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o out/stage/

      - name: Publish CLI
        run: >
          dotnet publish src/DevBrain.Cli -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o out/cli-stage/

      # Rename binaries to clean names
      - name: Stage release (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out/release
          # Copy all publish output (native libs like e_sqlite3 ship alongside the exe)
          cp out/stage/* out/release/ 2>/dev/null || true
          cp out/cli-stage/* out/release/ 2>/dev/null || true
          # Rename main binaries to clean names
          mv out/release/DevBrain.Api out/release/devbrain-daemon
          mv out/release/DevBrain.Cli out/release/devbrain
          # Remove leftover pdb/deps files that aren't needed at runtime
          rm -f out/release/*.pdb out/release/*.deps.json out/release/*.runtimeconfig.json
          cp LICENSE out/release/
          chmod +x out/release/devbrain-daemon out/release/devbrain

      - name: Stage release (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p out/release
          # Copy all publish output (native libs like e_sqlite3.dll ship alongside the exe)
          cp out/stage/* out/release/ 2>/dev/null || true
          cp out/cli-stage/* out/release/ 2>/dev/null || true
          # Rename main binaries to clean names
          mv out/release/DevBrain.Api.exe out/release/devbrain-daemon.exe
          mv out/release/DevBrain.Cli.exe out/release/devbrain.exe
          # Remove leftover pdb/deps files that aren't needed at runtime
          rm -f out/release/*.pdb out/release/*.deps.json out/release/*.runtimeconfig.json
          cp LICENSE out/release/

      # Package
      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd out/release
          tar -czf ../devbrain-${{ matrix.rid }}.tar.gz .

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd out/release
          7z a ../devbrain-${{ matrix.rid }}.zip . || zip -r ../devbrain-${{ matrix.rid }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: devbrain-${{ matrix.rid }}
          path: out/devbrain-${{ matrix.rid }}.*

  # Create GitHub Release on tag push
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/devbrain-*.tar.gz
            artifacts/devbrain-*.zip
